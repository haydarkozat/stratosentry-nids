# Ansible configuration for StratoSentry NIDS deployment.
[defaults]
# Inventory is passed inline on the command line, e.g.:
#   ansible-playbook -i <ec2_public_ip>, deploy_nids.yml --private-key <key.pem>
# (the trailing comma makes Ansible treat the value as an inline host list)

# Default SSH user for the Ubuntu EC2 instances provisioned by Terraform.
remote_user = ubuntu

# Disable host key checking so freshly provisioned EC2 hosts don't prompt
# for interactive fingerprint confirmation during automated runs.
host_key_checking = False

# Keep output readable and retry files out of the project tree.
retry_files_enabled = False
stdout_callback = yaml
interpreter_python = auto_silent

[privilege_escalation]
# Tasks need root (apt, systemd, writing to /opt). Escalate via sudo.
become = True
become_method = sudo

[ssh_connection]
# Speed up repeated SSH connections to the same host.
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
