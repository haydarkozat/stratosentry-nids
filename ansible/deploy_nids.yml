---
# ============================================================================
# StratoSentry NIDS — Deployment Playbook
#
# Provisions the StratoSentry sensor on a freshly created Ubuntu EC2 instance:
# installs system packages, clones the repository, builds a Python virtualenv,
# installs an auto-restarting systemd service, and starts it.
#
# Usage:
#   ansible-playbook -i <ec2_public_ip>, deploy_nids.yml
#   (the trailing comma makes Ansible treat the value as an inline inventory)
# ============================================================================
- name: Deploy StratoSentry NIDS sensor
  hosts: all
  become: true

  vars:
    repo_url: "https://github.com/haydarkozat/stratosentry-nids.git"
    repo_version: "main"
    project_dir: "/opt/stratosentry-nids"
    venv_dir: "/opt/stratosentry-nids/venv"
    service_name: "stratosentry"
    # Network interface the sensor sniffs on. Defaults to the host's primary
    # (default-route) interface, auto-detected via gathered facts.
    nids_interface: "{{ ansible_default_ipv4.interface }}"

  tasks:
    - name: Update the apt cache
      ansible.builtin.apt:
        update_cache: true
        # Avoid re-running apt-get update more often than needed.
        cache_valid_time: 3600

    - name: Ensure required system packages are installed
      ansible.builtin.apt:
        name:
          - git
          - python3
          - python3-pip
          - python3-venv
        state: present

    - name: Clone the StratoSentry NIDS repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: "{{ repo_version }}"
        # Pull the latest commit on subsequent runs (idempotent updates).
        update: true
      # A new clone or fetched changes should trigger a service restart.
      notify: Restart StratoSentry service

    - name: Create the Python virtual environment and install dependencies
      ansible.builtin.pip:
        requirements: "{{ project_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        # Build the venv with the system python3 if it does not exist yet.
        virtualenv_command: "python3 -m venv"
      notify: Restart StratoSentry service

    - name: Install the systemd service unit from template
      ansible.builtin.template:
        src: templates/stratosentry.service.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd daemon
        - Restart StratoSentry service

    - name: Enable and start the StratoSentry service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        enabled: true
        state: started
        # Pick up the unit file written above on the first run.
        daemon_reload: true

  handlers:
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart StratoSentry service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
